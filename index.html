<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Pinball Framework</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud">
        <h1>Neon Pinball</h1>
        <p>Left Shift: Left Flipper · Right Shift: Right Flipper · Control: Plunger</p>
        <div class="stats">
          <span id="balls-left">Balls: 3</span>
          <span id="score">Score: 0</span>
          <span id="layout-name">Layout: Classic</span>
        </div>
        <label>
          Table Layout:
          <select id="layout-select"></select>
        </label>
      </section>
      <canvas id="game" width="900" height="1200" aria-label="Pinball game canvas"></canvas>
      <div class="overlay hidden" id="game-over">
        <div>
          <h2>Game Over</h2>
          <p id="final-score"></p>
          <button id="restart-btn" type="button">Play Again</button>
        </div>
      </div>
    </main>
    <script src="pinball.js"></script>
  </body>
</html>
